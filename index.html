<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Chaturya ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- INTRO PAGE -->
    <section id="intro" class="scene active">

        <h1>It's a Special Day ❤️</h1>
        

        <button onclick="startCelebration()">
            So let's gather
        </button>

    </section>

    <!-- PARTY PAGE -->
    <section id="party" class="scene">

        <div id="banner">
            ChatuRya
        </div>

        <div id="message"></div>

        <div id="friends">

            <div class="friend" id="f1">
    <img src="./assets/d.png" alt="D">
</div>

<div class="friend" id="f2">
    <img src="./assets/p.png" alt="P">
</div>

<div class="friend" id="f3">
    <img src="./assets/v.png" alt="V">
</div>

<div class="friend" id="f4">
    <img src="./assets/s.png" alt="S">
</div>

<div class="friend" id="f5">
    <img src="./assets/m.png" alt="M">
</div>

<div class="friend" id="f6">
    <img src="./assets/k.png" alt="K">
</div>

        </div>

        <div id="cake">

            <img
                id="cakeEmoji"
                src="./assets/cake.png"
                alt="Birthday Cake"
            >

            <!-- KNIFE -->
            <div id="knife">🔪</div>

            <!-- CAKE SLICES -->
            <div id="cakeSlices"></div>

        </div>

        <div id="controls"></div>

    </section>
    

    <script src="script.js"></script>
<audio id="birthdaySong">
    <source src="./assets/song.mp3" type="audio/mpeg">
</audio>
</body>
</html>
